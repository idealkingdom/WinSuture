<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinSuture | Windows Optimization & Repair Suite</title>
    <meta name="description" content="WinSuture is a premium, lightweight, open-source Windows enhancement and repair suite. Optimize system performance and run repairs with a single PowerShell command.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #09090b;
            --fg: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.16);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-bg-hover: rgba(255, 255, 255, 0.05);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at center, rgba(39, 39, 42, 0.15) 0%, rgba(9, 9, 11, 0) 70%);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.04);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4), 0 0 25px rgba(255, 255, 255, 0.08);
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 12px;
            object-fit: contain;
        }

        .title {
            font-size: clamp(2.25rem, 6vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
            color: #ffffff;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 440px;
            font-weight: 400;
        }

        .command-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem 0.5rem 0.5rem 1.25rem;
            gap: 1rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .command-container:hover {
            border-color: var(--border-hover);
            background: var(--card-bg-hover);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .command-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
            flex-grow: 1;
        }

        .prompt {
            font-family: 'Geist Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            user-select: none;
            opacity: 0.6;
        }

        .command-text {
            font-family: 'Geist Mono', monospace;
            font-size: 0.9rem;
            color: #e4e4e7;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; /* Firefox */
            flex-grow: 1;
            text-align: left;
        }

        .command-text::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-family: 'Geist', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        /* Success State for Copy Button */
        .copy-btn.success {
            background: var(--success-bg);
            border-color: var(--success);
            color: var(--success);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        /* Toast notification styling */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            background: rgba(9, 9, 11, 0.9);
            border: 1px solid var(--border);
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .toast svg {
            color: var(--success);
        }

        @media (max-width: 500px) {
            .command-container {
                flex-direction: column;
                align-items: stretch;
                padding: 1.25rem;
                gap: 1.25rem;
            }

            .command-box {
                width: 100%;
            }

            .command-text {
                overflow-x: auto;
            }

            .copy-btn {
                width: 100%;
                justify-content: center;
                padding: 0.625rem;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="logo-container">
            <img src="https://media.giphy.com/media/3o85xwxr06YNoFdSbm/giphy.gif" alt="Coffee Cup" class="logo">
        </header>

        <h1 class="title">WinSuture</h1>
        <p class="description">A clean, lightweight Windows optimization and repair suite. Run instantly with a single command.</p>

        <div class="command-container">
            <div class="command-box">
                <span class="prompt">PS</span>
                <code class="command-text" id="command-text">irm https://raw.githubusercontent.com/idealkingdom/WinSuture/main/WinSuture.ps1 | iex</code>
            </div>
            <button class="copy-btn" id="copy-btn" onclick="copyCommand()" aria-label="Copy command to clipboard">
                <svg class="icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Copy</span>
            </button>
        </div>
    </main>

    <div class="toast" id="toast" role="alert" aria-live="polite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Copied to clipboard</span>
    </div>

    <script>
        function copyCommand() {
            const rawText = "irm https://raw.githubusercontent.com/idealkingdom/WinSuture/main/WinSuture.ps1 | iex";
            
            navigator.clipboard.writeText(rawText).then(() => {
                const toast = document.getElementById('toast');
                const btn = document.getElementById('copy-btn');
                const btnText = btn.querySelector('span');
                const btnIcon = btn.querySelector('svg');
                
                // Show toast
                toast.classList.add('visible');
                
                // Success state formatting for copy button
                btn.classList.add('success');
                btnText.textContent = 'Copied';
                const originalIcon = btnIcon.innerHTML;
                btnIcon.innerHTML = `<polyline points="20 6 9 17 4 12"></polyline>`;
                
                setTimeout(() => {
                    toast.classList.remove('visible');
                    btn.classList.remove('success');
                    btnText.textContent = 'Copy';
                    btnIcon.innerHTML = originalIcon;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
